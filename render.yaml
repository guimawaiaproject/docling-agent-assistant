# render.yaml — Render.com IaC (Neon PostgreSQL 2026)
services:
  - type: web
    name: docling-agent
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PWA_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: WATCHDOG_FOLDER
        value: ./Docling_Factures
