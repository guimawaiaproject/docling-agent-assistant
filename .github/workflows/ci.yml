name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: docling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        run: uv sync --all-extras
        env:
          UV_COMPILE_BYTECODE: 0

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/docling_test

      - name: Start API server
        run: uv run uvicorn main:app --host 127.0.0.1 --port 8000 &
        env:
          GEMINI_API_KEY: dummy-key-for-tests
          DATABASE_URL: postgresql://test:test@localhost:5432/docling_test
          JWT_SECRET: ci-test-secret-for-jwt-32chars-long

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && exit 0
            sleep 1
          done
          exit 1

      - name: Run tests
        run: uv run pytest -v --tb=short --cov=core --cov=services --cov-fail-under=65
        env:
          GEMINI_API_KEY: dummy-key-for-tests
          DATABASE_URL: postgresql://test:test@localhost:5432/docling_test
          JWT_SECRET: ci-test-secret-for-jwt-32chars-long

      - name: pip-audit (warning only)
        run: |
          pip install pip-audit
          uv export --no-dev -o $RUNNER_TEMP/req.txt
          pip-audit -r $RUNNER_TEMP/req.txt
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pwa
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit (warning only)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run tests with coverage
        run: pnpm exec vitest run --coverage --coverage.thresholds.lines=60

      - name: Build
        run: pnpm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.example.com' }}
          VITE_AUTH_REQUIRED: 'true'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: apps/pwa/dist/
          retention-days: 7

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run ruff
        run: uv run ruff check . ../../scripts

      - name: Validate Agent Skills
        run: python scripts/validate_skills.py
        working-directory: ${{ github.workspace }}

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pwa
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eslint
        run: pnpm run lint
